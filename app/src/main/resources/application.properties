spring.application.name=finances

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.locations=classpath:db/migration

openrouter.api-key=${OPENROUTER_API_KEY}

jwt.secret=${JWT_SECRET}
jwt.expiration-seconds=604800

app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password-hash=${APP_ADMIN_PASSWORD_HASH}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.api.base-path=/api/v1

telegram.bot-token=${TELEGRAM_BOT_TOKEN}
telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET}
telegram.allowed-chat-id=${TELEGRAM_ALLOWED_CHAT_ID}

spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.mapper.accept-case-insensitive-enums=true

# OpenTelemetry / SigNoz
otel.service.name=finances-backend
otel.exporter.otlp.endpoint=${SIGNOZ_OTLP_ENDPOINT}
otel.exporter.otlp.protocol=grpc
otel.logs.exporter=otlp
otel.traces.exporter=otlp
otel.metrics.exporter=none
otel.propagators=tracecontext,baggage

name: CI

on:
  push:
    branches:
      - 'feature/**'
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Skip push when PR already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only skip for feature branches on push when PR already exists.
          # develop and main pushes (post-merge) should always run CI.
          if [ "${{ github.event_name }}" != "push" ] || \
             ! echo "${{ github.ref_name }}" | grep -q "^feature/"; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          COUNT=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --base develop \
            --json number \
            --jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check src/

  test:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  docker-build:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build .

  auto-pr:
    needs: [lint, test, docker-build]
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Open PR to develop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          TITLE="${BRANCH#feature/}"

          EXISTING=$(gh pr list --head "$BRANCH" --base develop --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists, skipping"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Automated PR — all CI checks passed."

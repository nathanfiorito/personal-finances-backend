name: CI

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'doc/**'
      - 'docs/**'
      - 'test/**'
      - 'refactor/**'
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Skip push when PR already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # On pull_request events CI always runs.
          # On push: skip if a PR already exists for this branch,
          # so CI runs exactly once (via the PR sync event).
          # work branches → develop, develop → main. main is never skipped.
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          BRANCH="${{ github.ref_name }}"

          if echo "$BRANCH" | grep -qE "^(feature|fix|chore|doc|docs|test|refactor)/"; then
            BASE="develop"
          elif [ "$BRANCH" = "develop" ]; then
            BASE="main"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          COUNT=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base "$BASE" \
            --json number \
            --jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - run: mvn -B compile --no-transfer-progress
        working-directory: app

  build:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - run: mvn -B package -DskipTests --no-transfer-progress
        working-directory: app

  test:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      - run: mvn -B verify --no-transfer-progress
        working-directory: app

  auto-pr:
    needs: [lint, build, test]
    if: |
      github.event_name == 'push' && (
        startsWith(github.ref_name, 'feature/') ||
        startsWith(github.ref_name, 'fix/') ||
        startsWith(github.ref_name, 'chore/') ||
        startsWith(github.ref_name, 'doc/') ||
        startsWith(github.ref_name, 'docs/') ||
        startsWith(github.ref_name, 'test/') ||
        startsWith(github.ref_name, 'refactor/') ||
        github.ref_name == 'develop'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"

          if echo "$BRANCH" | grep -qE "^(feature|fix|chore|doc|docs|test|refactor)/"; then
            BASE="develop"
            TITLE="${BRANCH#*/}"
          else
            BASE="main"
            TITLE="Release: develop → main"
          fi

          EXISTING=$(gh pr list --head "$BRANCH" --base "$BASE" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists, skipping"
            exit 0
          fi

          gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Automated PR — all CI checks passed."

name: CI

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build .

  auto-pr:
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Open PR to develop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          TITLE="${BRANCH#feature/}"

          EXISTING=$(gh pr list --head "$BRANCH" --base develop --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists, skipping"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Automated PR — all CI checks passed."
